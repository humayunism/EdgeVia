apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgevia-proxy
  namespace: edgevia
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edgevia-proxy
  template:
    metadata:
      labels:
        app: edgevia-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: proxy
          image: edgevia/proxy:latest
          ports:
            - containerPort: 8080
            - containerPort: 8443
            - containerPort: 9090
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: edgevia-secrets
                  key: redis-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
