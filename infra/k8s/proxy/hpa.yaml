apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edgevia-proxy-hpa
  namespace: edgevia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edgevia-proxy
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
